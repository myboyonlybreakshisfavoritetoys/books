<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinderia | Cycle 3</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Dependencies -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>

    <style>
        :root {
            --bg-color: #0f0f0f;
            --ui-color: rgba(255, 255, 255, 0.8);
            --ui-bg: rgba(255, 255, 255, 0.1);
            --accent: #ffffff;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            color: var(--ui-color);
        }

        /* Top Bar UI */
        #top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            pointer-events: none;
        }

        #pdf-title {
            font-weight: 600;
            font-size: 0.8rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            background: var(--ui-bg);
            padding: 8px 16px;
            border-radius: 6px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.05);
            margin-left: auto;
        }

        #page-counter {
            font-size: 0.85rem;
            font-weight: 600;
            background: var(--ui-bg);
            padding: 8px 16px;
            border-radius: 6px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.05);
            pointer-events: auto;
            min-width: 80px;
            text-align: center;
        }

        /* Main Viewport */
        #viewport {
            width: 95%;
            height: 80%;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 2000px;
            touch-action: none;
        }

        #flipbook {
            display: none;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
        }

        #flipbook .page {
            background: white;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            max-width: 100%;
            max-height: 100%;
        }

        /* Bottom UI */
        .controls-bar {
            position: fixed;
            bottom: 30px;
            display: flex;
            gap: 15px;
            align-items: center;
            z-index: 100;
        }

        .icon-btn {
            background: var(--ui-bg);
            border: 1px solid rgba(255,255,255,0.05);
            color: white;
            padding: 12px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .icon-btn:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }

        /* Volume Slider Wrapper */
        .volume-container {
            display: flex;
            align-items: center;
            background: var(--ui-bg);
            padding: 0 15px 0 5px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.05);
            gap: 10px;
        }

        #volume-slider {
            width: 0;
            opacity: 0;
            transition: all 0.3s ease;
            cursor: pointer;
            accent-color: var(--accent);
        }

        .volume-container:hover #volume-slider {
            width: 80px;
            opacity: 1;
        }

        #loader {
            position: fixed;
            z-index: 1000;
            background: #000;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .error-state {
            color: #ff4444;
            text-align: center;
            padding: 20px;
        }

        /* Music Prompt if blocked */
        #music-prompt {
            position: fixed;
            bottom: 100px;
            background: var(--accent);
            color: black;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            display: none;
            z-index: 1001;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="loader">
        <div class="spinner"></div>
        <div id="status-text">Synchronizing Archive...</div>
    </div>

    <div id="top-bar">
        <div id="page-counter">PAGE 1 / -</div>
        <div id="pdf-title">Loading...</div>
    </div>

    <div id="music-prompt" onclick="startMusicManual()">
        🎵 Click to Enable Background Music
    </div>

    <div id="viewport">
        <div id="flipbook"></div>
    </div>

    <!-- Background Audio Element -->
    <audio id="bg-music" loop preload="auto">
        <source id="audio-source" src="" type="audio/mpeg">
    </audio>

    <div class="controls-bar">
        <div class="volume-container">
            <button class="icon-btn" id="mute-btn" style="background:transparent; border:none; backdrop-filter:none;" onclick="toggleMute()">
                <i id="volume-icon" data-lucide="volume-2"></i>
            </button>
            <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5" oninput="updateVolume(this.value)">
        </div>

        <button class="icon-btn" onclick="toggleFullscreen()" title="Fullscreen">
            <i data-lucide="maximize"></i>
        </button>
        <button class="icon-btn" onclick="window.close()" title="Close Viewer">
            <i data-lucide="x"></i>
        </button>
    </div>

    <script>
        // ==========================================
        //  ARCHIVE CONFIGURATION
        // ==========================================
        const PDF_URL = 'https://book.renj.top/pdf/CinderiaFInal.pdf';
        const PDF_DISPLAY_NAME = 'Cinderia';
        const BG_MUSIC_URL = 'https://book.renj.top/music/Taylor%20Swift%20-%20Clara%20Bow%20(Instrumental).mp3'; 
        // ==========================================

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        const audio = document.getElementById('bg-music');
        const audioSource = document.getElementById('audio-source');
        const musicPrompt = document.getElementById('music-prompt');
        let musicStarted = false;

        async function initViewer() {
            const status = document.getElementById('status-text');
            const flipbook = $('#flipbook');
            const titleEl = document.getElementById('pdf-title');

            titleEl.innerText = PDF_DISPLAY_NAME;

            // Setup Music
            if (BG_MUSIC_URL) {
                audioSource.src = BG_MUSIC_URL;
                audio.load();
                audio.volume = 0.5;
            }

            try {
                const loadingTask = pdfjsLib.getDocument({ 
                    url: PDF_URL,
                    disableAutoFetch: true,
                    disableStream: true
                });
                
                const pdf = await loadingTask.promise;
                const numPages = pdf.numPages;

                for (let i = 1; i <= numPages; i++) {
                    const page = await pdf.getPage(i);
                    const viewport = page.getViewport({ scale: 2 });
                    
                    const pageDiv = $('<div class="page"></div>');
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    await page.render({ canvasContext: context, viewport: viewport }).promise;
                    pageDiv.append(canvas);
                    flipbook.append(pageDiv);
                }

                const firstPage = await pdf.getPage(1);
                const firstViewport = firstPage.getViewport({ scale: 1 });
                const bookHeight = Math.min(window.innerHeight * 0.75, firstViewport.height * 1.5);
                const aspectRatio = firstViewport.width / firstViewport.height;
                const bookWidth = bookHeight * aspectRatio * 2;

                $('#loader').fadeOut();
                flipbook.css('display', 'block');

                flipbook.turn({
                    width: bookWidth,
                    height: bookHeight,
                    autoCenter: true,
                    display: 'double',
                    acceleration: true,
                    elevation: 50,
                    duration: 800,
                    when: {
                        turning: function(e, page) { 
                            updateCounter(page, numPages);
                            attemptMusic(); 
                        },
                        turned: function(e, page) { updateCounter(page, numPages); }
                    }
                });

                updateCounter(1, numPages);

                // Global interaction listener to "unlock" audio context
                document.body.addEventListener('mousedown', attemptMusic, { once: false });
                document.body.addEventListener('touchstart', attemptMusic, { once: false });
                document.body.addEventListener('keydown', attemptMusic, { once: false });

                // Keyboard
                $(window).bind('keydown', function(e) {
                    if (e.keyCode == 37 || e.keyCode == 38) flipbook.turn('previous');
                    else if (e.keyCode == 39 || e.keyCode == 40) flipbook.turn('next');
                });

                // Wheel
                let lastScrollTime = 0;
                window.addEventListener('wheel', function(e) {
                    const now = Date.now();
                    if (now - lastScrollTime < 600) return;
                    if (Math.abs(e.deltaY) < 10) return; 
                    if (e.deltaY > 0) { flipbook.turn('next'); lastScrollTime = now; }
                    else if (e.deltaY < 0) { flipbook.turn('previous'); lastScrollTime = now; }
                }, { passive: true });

                const mc = new Hammer(document.getElementById('viewport'));
                mc.on("swipeleft", () => { flipbook.turn("next"); });
                mc.on("swiperight", () => { flipbook.turn("previous"); });

                $(window).resize(function() {
                    const newHeight = Math.min(window.innerHeight * 0.75, firstViewport.height * 1.5);
                    const newWidth = newHeight * aspectRatio * 2;
                    flipbook.turn('size', newWidth, newHeight);
                });

                lucide.createIcons();

            } catch (err) {
                console.error("PDF Load Error:", err);
                status.innerHTML = `<div class="error-state">
                    <b>ACCESS DENIED</b><br>
                    <small>Verify PDF Link or CORS permissions.</small>
                </div>`;
                document.querySelector('.spinner').style.display = 'none';
            }
        }

        function attemptMusic() {
            if (musicStarted || !BG_MUSIC_URL) return;
            
            audio.play().then(() => {
                console.log("Music started successfully.");
                musicStarted = true;
                musicPrompt.style.display = 'none';
            }).catch(e => {
                console.warn("Autoplay blocked. Showing manual prompt.", e);
                musicPrompt.style.display = 'block';
            });
        }

        function startMusicManual() {
            audio.play().then(() => {
                musicStarted = true;
                musicPrompt.style.display = 'none';
            });
        }

        function toggleMute() {
            audio.muted = !audio.muted;
            const icon = document.getElementById('volume-icon');
            icon.setAttribute('data-lucide', audio.muted ? 'volume-x' : 'volume-2');
            lucide.createIcons();
        }

        function updateVolume(val) {
            audio.volume = val;
            audio.muted = (val == 0);
            const icon = document.getElementById('volume-icon');
            if (val == 0) icon.setAttribute('data-lucide', 'volume-x');
            else if (val < 0.5) icon.setAttribute('data-lucide', 'volume-1');
            else icon.setAttribute('data-lucide', 'volume-2');
            lucide.createIcons();
        }

        function updateCounter(current, total) {
            const counterEl = document.getElementById('page-counter');
            if (counterEl) {
                counterEl.innerText = `PAGE ${current} / ${total}`;
            }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else if (document.exitFullscreen) document.exitFullscreen();
        }

        $(document).ready(initViewer);
    </script>
</body>
</html>
